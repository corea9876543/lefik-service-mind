<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>아침 브리핑</title>
  <link rel="stylesheet" href="glasses.css">
  <style>
    .briefing-screen { display: grid; grid-template-rows: auto 1fr auto; width: 100%; min-height: 100vh; padding: 20px 28px 24px; background: #000; }
    .briefing-header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; min-height: 44px; color: #d1d5db; font-size: 28px; }
    .briefing-position { font-variant-numeric: tabular-nums; text-align: center; }
    .briefing-lock { min-width: 1.5em; text-align: right; }
    .stale-badge { margin-left: 12px; padding: 3px 8px; background: #facc15; color: #000; font-size: 18px; font-weight: 700; vertical-align: middle; }
    .briefing-body { display: flex; align-items: center; justify-content: center; min-height: 0; }
    .briefing-card { width: min(100%, 760px); padding: 20px 16px; text-align: center; }
    .briefing-title { margin: 0 0 18px; overflow: hidden; font-size: 38px; font-weight: 750; line-height: 1.15; text-overflow: ellipsis; white-space: nowrap; }
    .briefing-lines { margin: 0; padding: 0; list-style: none; font-size: 30px; line-height: 1.35; }
    .briefing-lines li { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .source-warning { margin: 12px 0 0; color: #9ca3af; font-size: 20px; }
    .briefing-state { color: #d1d5db; font-size: 30px; text-align: center; }
    .briefing-dots { display: flex; min-height: 24px; align-items: center; justify-content: center; gap: 12px; }
    .briefing-dot { width: 10px; height: 10px; border: 2px solid #9ca3af; border-radius: 50%; }
    .briefing-dot.current { border-color: #fff; background: #fff; transform: scale(1.35); }
    [hidden] { display: none !important; }
    @media (max-height: 420px) {
      .briefing-screen { padding: 10px 22px 12px; }
      .briefing-title { margin-bottom: 8px; font-size: 34px; }
      .briefing-lines { font-size: 28px; }
      .source-warning { margin-top: 5px; }
    }
  </style>
</head>
<body>
  <main class="briefing-screen" aria-live="polite">
    <header class="briefing-header">
      <div><span id="brief-date"></span><span id="stale-badge" class="stale-badge" hidden>어제 브리핑</span></div>
      <span id="brief-position" class="briefing-position"></span>
      <span id="brief-lock" class="briefing-lock" aria-label="금액 마스킹 켜짐">🔒</span>
    </header>
    <section class="briefing-body">
      <p id="brief-state" class="briefing-state" role="status">브리핑 불러오는 중…</p>
      <article id="brief-card" class="briefing-card" hidden>
        <h1 id="brief-title" class="briefing-title"></h1>
        <ul id="brief-lines" class="briefing-lines"></ul>
        <p id="source-warning" class="source-warning" hidden></p>
      </article>
    </section>
    <nav id="brief-dots" class="briefing-dots" aria-label="브리핑 카드 위치"></nav>
  </main>
  <script src="js/shared.js"></script>
  <script src="js/briefing.js"></script>
</body>
</html>
