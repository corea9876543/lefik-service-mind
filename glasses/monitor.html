<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="mrbd-web-app-capable" content="yes">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="dark">
  <title>Claude Code 모니터</title>
  <link rel="stylesheet" href="glasses.css?v=3">
  <style>
    body { background: #000; color: #fff; }
    .monitor-screen { padding: 40px 32px; }
    .monitor-card { width: min(100%, 536px); max-height: none; padding: 28px 24px; text-align: left; }
    .status-row { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; }
    .status-label { margin: 0; font-size: 36px; line-height: 1.15; }
    .status-label.running { color: #7cfc00; }
    .status-label.waiting { color: #ffd54f; }
    .status-label.done { color: #4fc3f7; }
    .status-label.error, .status-label.offline { color: #ff6e6e; }
    .relative-time { flex: none; color: #d1d5db; font-size: 28px; }
    .headline { overflow: hidden; margin: 20px 0 0; font-size: 32px; line-height: 1.25; text-overflow: ellipsis; white-space: nowrap; }
    .stale-badge { color: #ff6e6e; font-size: 28px; font-weight: 700; }
    .progress-row { display: flex; align-items: center; gap: 16px; margin-top: 20px; font-size: 28px; }
    .progress-track { flex: 1; height: 14px; border: 2px solid #fff; }
    .progress-bar { width: 0; height: 100%; background: #fff; transition: width 180ms linear; }
    .question-hint { overflow: hidden; margin: 20px 0 0; color: #ffd54f; font-size: 28px; line-height: 1.2; text-overflow: ellipsis; white-space: nowrap; }
    .answer-card { display: none; }
    .answer-card.active { display: block; }
    .status-card.hidden { display: none; }
    .question-text { display: -webkit-box; overflow: hidden; margin: 0 0 16px; font-size: 30px; line-height: 1.2; -webkit-box-orient: vertical; -webkit-line-clamp: 2; }
    .choice-list { margin: 0; padding: 0; list-style: none; }
    .choice { overflow: hidden; padding: 8px 12px; font-size: 28px; line-height: 1.15; text-overflow: ellipsis; white-space: nowrap; }
    .choice.selected { background: #fff; color: #000; font-weight: 700; }
    .back-hint { float: right; color: inherit; font-weight: 400; }
    .toast { position: fixed; right: 24px; bottom: 24px; left: 24px; z-index: 2; padding: 12px 16px; background: #fff; color: #000; font-size: 28px; text-align: center; }
    .toast.error { background: #ff6e6e; }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <main class="screen monitor-screen">
    <section id="status-card" class="monitor-card status-card" aria-live="polite">
      <div class="status-row">
        <h1 id="status-label" class="status-label offline">● OFFLINE</h1>
        <span id="relative-time" class="relative-time"></span>
      </div>
      <p id="headline" class="headline">상태를 불러오는 중</p>
      <div id="progress-row" class="progress-row" hidden>
        <div class="progress-track" role="progressbar" aria-label="작업 진행률" aria-valuemin="0" aria-valuemax="0" aria-valuenow="0">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <span id="step-label"></span>
      </div>
      <p id="question-hint" class="question-hint" hidden></p>
    </section>
    <section id="answer-card" class="monitor-card answer-card" aria-label="질문 응답 선택">
      <h1 id="question-text" class="question-text"></h1>
      <ul id="choice-list" class="choice-list" aria-label="응답 선택지"></ul>
    </section>
  </main>
  <div id="toast" class="toast" role="status" hidden></div>
  <script src="js/shared.js?v=3"></script>
  <script src="js/monitor.js?v=3"></script>
</body>
</html>
