<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Claude 세션 모니터링 + 질문 (모델/세션) 글래스 앱">
  <meta name="mrbd-web-app-capable" content="yes">
  <title>Claude on Glasses</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <!-- ===== 홈/모니터 ===== -->
    <div id="monitor" class="screen">
      <header class="header">
        <span class="dot focusable-none" id="m-dot"></span>
        <h1 id="m-state">RUNNING</h1>
        <span class="header-meta" id="m-rel">—</span>
      </header>
      <div class="content">
        <div class="headline" id="m-headline">연결 중…</div>
        <div class="progress"><i id="m-bar"></i></div>
        <div class="sub" id="m-step"></div>
      </div>
      <nav class="nav-bar">
        <button class="nav-item focusable" data-action="go-ask">묻기 ▶</button>
        <button class="nav-item focusable" data-action="refresh">새로고침</button>
      </nav>
    </div>

    <!-- ===== 질문 ===== -->
    <div id="ask" class="screen hidden">
      <header class="header">
        <button class="back-btn focusable" data-action="back">&#8592;</button>
        <h1>묻기</h1>
        <button class="header-meta focusable" data-action="toggle-target" id="a-target">대상: 모델</button>
      </header>
      <div class="content">
        <input id="a-input" class="focusable" type="text"
               placeholder="질문 (핸드라이팅)" data-submit-action="ask-send" />
        <div class="answer" id="a-answer"></div>
      </div>
      <nav class="nav-bar">
        <button class="nav-item focusable" data-action="ask-send">묻기</button>
      </nav>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
