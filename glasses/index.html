<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>안경 허브</title>
  <link rel="stylesheet" href="glasses.css">
</head>
<body>
  <main class="screen">
    <p class="hub-clock" id="clock" aria-label="현재 시각"></p>
    <nav class="hub" aria-label="모듈 선택">
      <ul class="hub-list">
        <li><button class="hub-item focused" type="button" data-href="monitor.html">모니터</button></li>
        <li><button class="hub-item" type="button" data-href="hud.html">운영 HUD</button></li>
        <li><button class="hub-item" type="button" data-href="agent.html">에이전트</button></li>
        <li><button class="hub-item" type="button" data-href="briefing.html">브리핑</button></li>
        <li><button class="hub-item" type="button" data-href="alerts.html">알림</button></li>
      </ul>
    </nav>
    <p class="hint">위아래 이동 · 선택 진입</p>
  </main>
  <script src="js/shared.js"></script>
  <script>
    (function () {
      "use strict";
      var items = Array.from(document.querySelectorAll(".hub-item"));
      var focused = 0;
      var clock = document.getElementById("clock");

      function renderFocus() {
        items.forEach(function (item, index) {
          var isFocused = index === focused;
          item.classList.toggle("focused", isFocused);
          item.setAttribute("aria-current", isFocused ? "true" : "false");
        });
        items[focused].focus({ preventScroll: true });
      }

      function updateClock() {
        clock.textContent = G.fmtTime(new Date().toISOString());
      }

      items.forEach(function (item, index) {
        item.addEventListener("focus", function () {
          focused = index;
          renderFocus();
        });
        item.addEventListener("click", function () {
          window.location.href = item.dataset.href;
        });
      });

      G.input({
        onNav: function (direction) {
          if (direction !== "up" && direction !== "down") return;
          focused = (focused + (direction === "down" ? 1 : -1) + items.length) % items.length;
          renderFocus();
        },
        onSelect: function () {
          window.location.href = items[focused].dataset.href;
        }
      });

      updateClock();
      G.poll(updateClock, 1000);
      renderFocus();
    }());
  </script>
</body>
</html>
