<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="theme-color" content="#000000">
<title>Claude 세션 모니터</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  /*
    글랜스 모니터.
    - 폰: 전체 정보 표시
    - 좁은/정사각 뷰포트(레이밴 디스플레이 렌즈): 초압축 모드로 자동 전환
    - 검정 배경 = 레이밴 렌즈에서 투명하게 렌더링되므로 고대비 밝은 텍스트 사용
  */
  :root{
    --bg:#000;
    --fg:#fff;
    --dim:#8a8a8a;
    --line:rgba(255,255,255,.14);
    --run:#4ea1ff;    /* running  */
    --wait:#ffc24e;   /* waiting  */
    --done:#5fd07a;   /* done     */
    --err:#ff6b5e;    /* error    */
    --accent:var(--run);
    --font:'Pretendard Variable','Apple SD Gothic Neo',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:var(--font);background:var(--bg);color:var(--fg);
    -webkit-font-smoothing:antialiased;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  #app{
    width:100%;max-width:560px;padding:clamp(20px,6vw,44px);
    display:flex;flex-direction:column;gap:clamp(14px,3.2vh,26px);
  }

  /* 상단: 상태 배지 + 세션명 */
  .top{display:flex;align-items:center;gap:12px;}
  .dot{
    width:14px;height:14px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 0 var(--accent);flex:0 0 auto;
  }
  .live .dot{animation:pulse 1.8s ease-out infinite;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--accent) 70%,transparent);}
    100%{box-shadow:0 0 0 16px transparent;}
  }
  .state{
    font-size:clamp(13px,3.4vw,16px);font-weight:800;letter-spacing:.14em;
    text-transform:uppercase;color:var(--accent);
  }
  .session{margin-left:auto;font-size:clamp(11px,3vw,13px);color:var(--dim);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:48%;}

  /* 본문: 헤드라인 */
  .headline{font-size:clamp(26px,7.6vw,46px);font-weight:800;line-height:1.18;letter-spacing:-.01em;}
  .task{font-size:clamp(14px,3.8vw,18px);color:var(--dim);font-weight:600;}

  /* 진행률 */
  .progress{display:flex;flex-direction:column;gap:8px;}
  .bar{height:10px;border-radius:99px;background:rgba(255,255,255,.1);overflow:hidden;}
  .bar > i{display:block;height:100%;width:0;border-radius:99px;background:var(--accent);
    transition:width .5s cubic-bezier(.2,.7,.2,1);}
  .pmeta{display:flex;justify-content:space-between;font-size:clamp(12px,3.2vw,14px);color:var(--dim);font-weight:700;}

  /* 하단 메타 */
  .foot{display:flex;align-items:center;gap:10px;font-size:clamp(11px,3vw,13px);color:var(--dim);}
  .foot .sep{opacity:.4;}
  .badge-need{
    display:none;margin-left:auto;padding:5px 12px;border-radius:99px;
    background:var(--wait);color:#000;font-weight:800;font-size:clamp(11px,3vw,13px);
  }
  body[data-need="true"] .badge-need{display:inline-block;}

  /* 상태별 색 */
  body[data-state="running"]{--accent:var(--run);}
  body[data-state="waiting"]{--accent:var(--wait);}
  body[data-state="done"]   {--accent:var(--done);}
  body[data-state="error"]  {--accent:var(--err);}

  /* 연결 끊김 */
  body.stale{--accent:var(--dim);}
  body.stale .dot{animation:none;}

  /* ===== 레이밴 디스플레이 / 초소형 글랜스 모드 =====
     좁거나 정사각에 가까운 뷰포트에서는 핵심만 크게 */
  @media (max-width:420px), (max-aspect-ratio:1/1){
    .session,.task,.foot .upd-abs{display:none;}
    #app{gap:clamp(12px,3vh,20px);padding:clamp(16px,5vw,28px);}
    .headline{font-size:clamp(28px,9vw,40px);line-height:1.12;}
  }
</style>
</head>
<body class="live" data-state="running" data-need="false">
  <main id="app" role="status" aria-live="polite">
    <div class="top">
      <span class="dot"></span>
      <span class="state" id="state">RUNNING</span>
      <span class="session" id="session">—</span>
    </div>

    <div>
      <div class="headline" id="headline">연결 중…</div>
      <div class="task" id="task"></div>
    </div>

    <div class="progress" id="progress">
      <div class="bar"><i id="barFill"></i></div>
      <div class="pmeta">
        <span id="stepLabel">—</span>
        <span id="pct">0%</span>
      </div>
    </div>

    <div class="foot">
      <span id="updRel">—</span>
      <span class="sep">·</span>
      <span class="upd-abs" id="updAbs">—</span>
      <span class="badge-need">입력 대기</span>
    </div>
  </main>

<script>
  // ── 설정 ────────────────────────────────────────────────
  // 같은 출처(GitHub Pages 등)에 status.json이 있으면 그대로 사용.
  // 다른 곳(raw URL 등)을 보려면 ?src= 로 덮어쓰기 가능.
  const params   = new URLSearchParams(location.search);
  const STATUS_URL  = params.get('src')  || 'status.json';
  const POLL_MS     = (parseInt(params.get('poll'),10) || 5) * 1000;
  const STALE_MS    = 90 * 1000; // 마지막 갱신 90초 넘으면 '오프라인' 처리

  const STATE_LABEL = { running:'RUNNING', waiting:'WAITING', done:'DONE', error:'ERROR' };

  const $ = id => document.getElementById(id);
  let lastUpdated = null;

  async function tick(){
    try{
      const res = await fetch(STATUS_URL + '?t=' + Date.now(), {cache:'no-store'});
      if(!res.ok) throw new Error(res.status);
      render(await res.json());
      document.body.classList.remove('stale');
    }catch(e){
      document.body.classList.add('stale');
      $('state').textContent = 'OFFLINE';
    }
    refreshRel();
  }

  function render(s){
    const state = (s.state || 'running').toLowerCase();
    document.body.dataset.state = STATE_LABEL[state] ? state : 'running';
    document.body.dataset.need  = String(!!s.needsInput);
    document.body.classList.toggle('live', state === 'running');

    $('state').textContent   = STATE_LABEL[state] || state.toUpperCase();
    $('session').textContent = s.session || '';
    $('headline').textContent= s.headline || '(상태 없음)';
    $('task').textContent    = s.task || '';

    const cur = s.step?.current ?? 0, tot = s.step?.total ?? 0;
    const pct = tot > 0 ? Math.round(cur / tot * 100) : (state === 'done' ? 100 : 0);
    $('progress').style.display = tot > 0 ? '' : 'none';
    $('barFill').style.width = pct + '%';
    $('stepLabel').textContent = tot > 0 ? `${cur} / ${tot} 단계` : '';
    $('pct').textContent = pct + '%';

    lastUpdated = s.updatedAt ? new Date(s.updatedAt) : new Date();
    $('updAbs').textContent = lastUpdated.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    document.title = `${STATE_LABEL[state]||state} · ${s.headline||'세션'}`;
  }

  function refreshRel(){
    if(!lastUpdated){ $('updRel').textContent = '—'; return; }
    const sec = Math.max(0, Math.round((Date.now() - lastUpdated) / 1000));
    $('updRel').textContent =
      sec < 60 ? `${sec}초 전 갱신` :
      sec < 3600 ? `${Math.floor(sec/60)}분 전 갱신` :
      `${Math.floor(sec/3600)}시간 전 갱신`;
    if(Date.now() - lastUpdated > STALE_MS) document.body.classList.add('stale');
  }

  tick();
  setInterval(tick, POLL_MS);
  setInterval(refreshRel, 1000);
  document.addEventListener('visibilitychange', () => { if(!document.hidden) tick(); });
</script>
</body>
</html>
